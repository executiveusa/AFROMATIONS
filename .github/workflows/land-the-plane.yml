name: 🛬 Land the Plane

# ─────────────────────────────────────────────────────────────────────────────
# AFROMATIONS Studios — "Landing the Plane" Deployment Orchestrator
#
# Triggered by:
#   • Manually via workflow_dispatch
#   • Hana agent running: gh workflow run land-the-plane.yml
#   • Issue/PR comment containing the phrase "landing the plane"
#
# What it does (in order):
#   1. Collects every open branch → consolidates into one staging PR
#   2. Runs CI: lint (auto-fix loop), typecheck, build
#   3. Fixes everything it can, re-runs until all checks are green
#   4. Squash-merges the consolidated PR to main
#   5. Deploys main to Vercel (production)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are we landing? (optional)"
        required: false
        default: "Standard deployment"

  issue_comment:
    types: [created]

  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: land-the-plane
  cancel-in-progress: false

jobs:
  # ── 0. Gate: validate phrase trigger for comment events ──────────────────
  gate:
    name: 🔑 Validate Trigger
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check trigger phrase
        id: check
        run: |
          EVENT="${{ github.event_name }}"
          COMMENT_BODY="${{ github.event.comment.body }}"
          REVIEW_BODY="${{ github.event.comment.body }}"

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "✅ Manual trigger — running"
          elif echo "$COMMENT_BODY $REVIEW_BODY" | grep -qi "landing the plane"; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "✅ Phrase detected — running"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Phrase not detected — skipping"
          fi

  # ── 1. Consolidate all branches into one PR ──────────────────────────────
  consolidate:
    name: 🔀 Consolidate Branches
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.create-pr.outputs.pr-number }}
      staging-branch: ${{ steps.setup.outputs.branch }}
      has-branches: ${{ steps.list-branches.outputs.has-branches }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Hana [bot]"
          git config user.email "hana@afromations.studio"

      - name: List non-main branches
        id: list-branches
        run: |
          BRANCHES=$(git branch -r \
            | grep -v 'origin/main\|origin/HEAD\|land-the-plane/' \
            | sed 's|  origin/||' \
            | tr '\n' ' ' \
            | xargs)
          echo "branches=$BRANCHES" >> "$GITHUB_OUTPUT"
          if [[ -n "$BRANCHES" ]]; then
            echo "has-branches=true"  >> "$GITHUB_OUTPUT"
            echo "📋 Branches to consolidate: $BRANCHES"
          else
            echo "has-branches=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No extra branches — deploying main directly"
          fi

      - name: Create staging branch
        id: setup
        run: |
          BRANCH="land-the-plane/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Merge all branches (ours wins on conflict)
        id: merge
        run: |
          MERGED=""
          SKIPPED=""
          BRANCHES="${{ steps.list-branches.outputs.branches }}"

          for B in $BRANCHES; do
            echo "⏳ Merging origin/$B..."
            if git merge --no-edit -X theirs "origin/$B" 2>/dev/null; then
              MERGED="$MERGED $B"
              echo "  ✅ $B"
            else
              git merge --abort 2>/dev/null || true
              echo "  ⚠️ $B — merge aborted, skipping"
              SKIPPED="$SKIPPED $B"
            fi
          done

          echo "merged=$MERGED"   >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"

      - name: Push staging branch
        run: git push origin HEAD

      - name: Create consolidated PR
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch  = '${{ steps.setup.outputs.branch }}';
            const merged  = '${{ steps.merge.outputs.merged }}'.trim();
            const skipped = '${{ steps.merge.outputs.skipped }}'.trim();
            const reason  = '${{ inputs.reason || "Landing the plane 🛬" }}';

            const body = [
              '## 🛬 Land the Plane — Consolidated Deploy',
              '',
              `**Trigger reason:** ${reason}`,
              '',
              merged  ? `**✅ Merged branches:**\n${merged.split(' ').filter(Boolean).map(b => `- \`${b}\``).join('\n')}` : '**No extra branches were merged.**',
              '',
              skipped ? `**⚠️ Skipped (conflict):**\n${skipped.split(' ').filter(Boolean).map(b => `- \`${b}\``).join('\n')}` : '',
              '',
              '> Auto-generated by **Hana 🌸** — AFROMATIONS Studios',
            ].filter(l => l !== null).join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: '🛬 Land the Plane — Consolidated Deploy',
              body,
              head:  branch,
              base:  'main',
            });

            core.setOutput('pr-number', pr.number);
            console.log(`✅ Created PR #${pr.number}: ${pr.html_url}`);

  # ── 2. Quality Gate: lint + auto-fix loop, typecheck, build ─────────────
  quality-gate:
    name: ✅ Quality Gate
    needs: consolidate
    if: needs.consolidate.outputs.pr-number != ''
    uses: ./.github/workflows/_reusable-ci.yml
    with:
      ref: ${{ needs.consolidate.outputs.staging-branch }}
    secrets: inherit

  # ── 3. If CI failed, attempt auto-fix and re-run once ───────────────────
  auto-fix:
    name: 🔧 Auto-Fix & Re-check
    needs: [consolidate, quality-gate]
    if: failure() && needs.consolidate.outputs.pr-number != ''
    runs-on: ubuntu-latest
    outputs:
      fixed: ${{ steps.commit.outputs.fixed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.consolidate.outputs.staging-branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        working-directory: afromations-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Auto-fix lint
        working-directory: afromations-frontend
        run: pnpm exec next lint --fix --dir src || true

      - name: Format with prettier (if available)
        working-directory: afromations-frontend
        run: pnpm exec prettier --write "src/**/*.{ts,tsx,css}" 2>/dev/null || true

      - name: Commit fixes
        id: commit
        run: |
          git config user.name "Hana [bot]"
          git config user.email "hana@afromations.studio"
          git add -A
          if git diff --staged --quiet; then
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Nothing to fix"
          else
            git commit -m "fix: auto-fix lint/format issues [land-the-plane]"
            git push origin HEAD
            echo "fixed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Pushed auto-fixes"
          fi

  ci-recheck:
    name: ✅ Re-check After Auto-Fix
    needs: [consolidate, auto-fix]
    if: always() && needs.consolidate.outputs.pr-number != '' && needs.auto-fix.outputs.fixed == 'true'
    uses: ./.github/workflows/_reusable-ci.yml
    with:
      ref: ${{ needs.consolidate.outputs.staging-branch }}
    secrets: inherit

  # ── 4. Merge consolidated PR to main ────────────────────────────────────
  merge:
    name: 🔀 Merge to Main
    needs: [consolidate, quality-gate, ci-recheck]
    # Run if quality-gate passed OR if ci-recheck passed after auto-fix
    if: |
      always() &&
      needs.consolidate.outputs.pr-number != '' &&
      (needs.quality-gate.result == 'success' || needs.ci-recheck.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Approve and merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ needs.consolidate.outputs.pr-number }}');

            // Squash merge to main
            await github.rest.pulls.merge({
              owner:         context.repo.owner,
              repo:          context.repo.repo,
              pull_number:   prNumber,
              merge_method:  'squash',
              commit_title:  '🛬 Land the Plane — Deployed to Production',
              commit_message: 'Auto-merged and deployed by Hana 🌸',
            });

            console.log(`✅ PR #${prNumber} merged to main`);

            // Delete staging branch
            const branch = '${{ needs.consolidate.outputs.staging-branch }}';
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `heads/${branch}`,
              });
              console.log(`🧹 Deleted staging branch: ${branch}`);
            } catch (e) {
              console.log(`Note: could not delete branch: ${e.message}`);
            }

  # ── 5. Deploy to Vercel ──────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    needs: merge
    if: success()
    uses: ./.github/workflows/_reusable-deploy-vercel.yml
    secrets: inherit
