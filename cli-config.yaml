# ============================================================
# Cron Registry (matches hanna-backend/cron-registry.json)
# ============================================================
crons:
  keepalive:
    schedule: "*/20 * * * *"
    agent: gamma
    task: "Health check all services"

  anime_trends:
    schedule: "0 9 * * *"
    agent: beta
    task: "Scan anime trends and generate content queue"

  weekly_asset:
    schedule: "0 14 * * 1"
    agent: alpha
    task: "Generate weekly featured character asset"

  blog_publish:
    schedule: "0 12 * * 3,6"
    agent: beta
    task: "Publish queued blog post"

  community_digest:
    schedule: "0 18 * * 5"
    agent: beta
    task: "Compile and send weekly community digest"

# ============================================================
# Quality Gates (SYNTHIA 3.0)
# ============================================================
quality_gates:
  udec_floor: 8.5
  arch_floor: 8.5
  cost_guard:
    daily_limit_usd: 50
    per_task_limit_usd: 10

# ============================================================
# Infrastructure
# ============================================================
infrastructure:
  supabase:
    host: "31.220.58.212"
    kong_port: 8001
    studio_port: 3001
    database: "second_brain"

  cloudflare:
    workers_name: "hanna-api"
    compatibility_date: "2025-04-01"

  frontend:
    framework: "nextjs"
    deploy_target: "cloudflare_pages"
    local_port: 3000
